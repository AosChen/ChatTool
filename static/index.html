<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatTool</title>
  <style>
    :root {
      --bg: #efe7da;
      --surface: rgba(255, 251, 245, 0.92);
      --surface-strong: #fffdf8;
      --line: rgba(59, 47, 36, 0.12);
      --text: #2e2a26;
      --muted: #73685c;
      --accent: #0f766e;
      --accent-soft: #d9f4ef;
      --user: #14532d;
      --danger: #b42318;
      --danger-soft: #ffe4e1;
      --shadow: 0 24px 60px rgba(74, 57, 41, 0.14);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.8), transparent 30%),
        radial-gradient(circle at bottom right, rgba(15, 118, 110, 0.12), transparent 28%),
        linear-gradient(135deg, #efe7da, #dcc9b0);
      padding: 18px;
    }

    .app {
      width: min(1280px, 100%);
      min-height: calc(100vh - 36px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 300px 1fr;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 32px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .sidebar {
      background: linear-gradient(180deg, rgba(255,253,248,0.96), rgba(247, 238, 226, 0.92));
      border-right: 1px solid var(--line);
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.7rem;
    }

    .brand p,
    .meta,
    .session-subtitle,
    .status {
      color: var(--muted);
      line-height: 1.5;
    }

    .new-chat {
      border: none;
      border-radius: 16px;
      background: var(--accent);
      color: white;
      padding: 12px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      font-weight: 700;
    }

    select,
    textarea,
    button {
      font: inherit;
    }

    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.92);
      color: var(--text);
      padding: 12px 14px;
    }

    .session-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      min-height: 0;
      padding-right: 4px;
    }

    .session-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.55);
      cursor: pointer;
    }

    .session-item.active {
      background: var(--accent-soft);
      border-color: rgba(15, 118, 110, 0.18);
    }

    .session-title {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-delete {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .session-delete:hover {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      padding: 22px 26px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.45);
    }

    .header h2 {
      margin: 0 0 4px;
      font-size: 1.3rem;
    }

    .messages {
      min-height: 0;
      overflow-y: auto;
      padding: 22px 26px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .empty {
      margin: auto;
      text-align: center;
      color: var(--muted);
      max-width: 460px;
      line-height: 1.6;
    }

    .message {
      max-width: min(78%, 820px);
      border-radius: var(--radius);
      padding: 15px 18px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      animation: rise 0.2s ease;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user);
      color: white;
      border-bottom-right-radius: 8px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      border-bottom-left-radius: 8px;
    }

    .message.error {
      align-self: center;
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid rgba(180, 35, 24, 0.18);
      max-width: 90%;
    }

    .composer {
      border-top: 1px solid var(--line);
      padding: 18px 26px 24px;
      background: rgba(255,255,255,0.52);
    }

    .composer-grid {
      display: grid;
      grid-template-columns: 1fr 132px;
      gap: 12px;
      align-items: end;
    }

    #prompt {
      min-height: 74px;
      max-height: 240px;
      resize: vertical;
    }

    .send {
      border: none;
      border-radius: 18px;
      background: var(--accent);
      color: white;
      padding: 14px 16px;
      font-weight: 700;
      cursor: pointer;
      height: 52px;
    }

    .send:disabled,
    .new-chat:disabled,
    select:disabled,
    textarea:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 920px) {
      body { padding: 0; }
      .app {
        min-height: 100vh;
        border-radius: 0;
        grid-template-columns: 1fr;
      }
      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--line);
      }
      .header {
        flex-direction: column;
        align-items: stretch;
      }
      .message {
        max-width: 92%;
      }
      .composer-grid {
        grid-template-columns: 1fr;
      }
      .send {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1 id="appName">ChatTool</h1>
        <p>直接读取你的 ghc-api 模型列表，自动选择正确端点。多会话仅保存在当前浏览器。</p>
      </div>

      <button class="new-chat" id="newChatBtn">+ 新建会话</button>

      <div class="field">
        <label for="modelSelect">模型</label>
        <select id="modelSelect">
          <option value="">正在加载模型...</option>
        </select>
      </div>

      <div class="meta" id="modelMeta">尚未加载模型信息</div>
      <div class="status" id="status">准备就绪</div>

      <div class="session-list" id="sessionList"></div>
    </aside>

    <main class="main">
      <div class="header">
        <div>
          <h2 id="chatTitle">当前会话</h2>
          <div class="meta" id="chatSubtitle">选择一个模型后开始聊天。</div>
        </div>
        <div class="meta" id="endpointHint">端点将由后端按模型自动选择。</div>
      </div>

      <section class="messages" id="messages">
        <div class="empty" id="emptyState">先选择模型，然后发送第一条消息。会话标题会按首条消息自动生成。</div>
      </section>

      <div class="composer">
        <div class="composer-grid">
          <textarea id="prompt" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
          <button class="send" id="sendBtn">发送</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const STORAGE_KEY = 'chattool_sessions_v1';
    const ACTIVE_KEY = 'chattool_active_session_v1';

    const state = {
      models: [],
      activeSessionId: null,
      sessions: [],
      sending: false,
    };

    const appNameEl = document.getElementById('appName');
    const modelSelectEl = document.getElementById('modelSelect');
    const modelMetaEl = document.getElementById('modelMeta');
    const statusEl = document.getElementById('status');
    const sessionListEl = document.getElementById('sessionList');
    const chatTitleEl = document.getElementById('chatTitle');
    const chatSubtitleEl = document.getElementById('chatSubtitle');
    const endpointHintEl = document.getElementById('endpointHint');
    const messagesEl = document.getElementById('messages');
    const emptyStateEl = document.getElementById('emptyState');
    const promptEl = document.getElementById('prompt');
    const sendBtnEl = document.getElementById('sendBtn');
    const newChatBtnEl = document.getElementById('newChatBtn');

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function saveSessions() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.sessions));
      if (state.activeSessionId) {
        localStorage.setItem(ACTIVE_KEY, state.activeSessionId);
      } else {
        localStorage.removeItem(ACTIVE_KEY);
      }
    }

    function loadSessions() {
      try {
        state.sessions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch {
        state.sessions = [];
      }
      state.activeSessionId = localStorage.getItem(ACTIVE_KEY);
      if (state.activeSessionId && !state.sessions.some((item) => item.id === state.activeSessionId)) {
        state.activeSessionId = null;
      }
    }

    function getActiveSession() {
      return state.sessions.find((item) => item.id === state.activeSessionId) || null;
    }

    function selectedModel() {
      return state.models.find((item) => item.id === modelSelectEl.value) || null;
    }

    function setModelMeta(model) {
      if (!model) {
        modelMetaEl.textContent = '尚未加载模型信息';
        return;
      }
      const vendor = model.vendor || 'unknown vendor';
      modelMetaEl.textContent = `${vendor} · 默认端点 ${model.default_endpoint}`;
    }

    function syncModelFromSession() {
      const session = getActiveSession();
      if (session && session.model && state.models.some((item) => item.id === session.model)) {
        modelSelectEl.value = session.model;
      }
      setModelMeta(selectedModel());
    }

    function createSession(initialTitle = '新会话') {
      const session = {
        id: crypto.randomUUID(),
        title: initialTitle,
        model: modelSelectEl.value || '',
        messages: [],
        updatedAt: new Date().toISOString(),
      };
      state.sessions.unshift(session);
      state.activeSessionId = session.id;
      saveSessions();
      renderSessionList();
      renderMessages();
      return session;
    }

    function deleteSession(id, event) {
      if (event) {
        event.stopPropagation();
      }
      state.sessions = state.sessions.filter((item) => item.id !== id);
      if (state.activeSessionId === id) {
        state.activeSessionId = state.sessions[0]?.id || null;
      }
      saveSessions();
      renderSessionList();
      syncModelFromSession();
      renderMessages();
    }

    function setActiveSession(id) {
      state.activeSessionId = id;
      saveSessions();
      renderSessionList();
      syncModelFromSession();
      renderMessages();
    }

    function renderSessionList() {
      sessionListEl.innerHTML = '';
      if (!state.sessions.length) {
        const div = document.createElement('div');
        div.className = 'session-subtitle';
        div.textContent = '还没有会话。点击“新建会话”或直接发送消息。';
        sessionListEl.appendChild(div);
        return;
      }

      for (const session of state.sessions) {
        const item = document.createElement('div');
        item.className = 'session-item' + (session.id === state.activeSessionId ? ' active' : '');
        item.addEventListener('click', () => setActiveSession(session.id));

        const textWrap = document.createElement('div');
        const title = document.createElement('div');
        title.className = 'session-title';
        title.textContent = session.title;
        const subtitle = document.createElement('div');
        subtitle.className = 'session-subtitle';
        subtitle.textContent = session.model || '未选择模型';
        textWrap.appendChild(title);
        textWrap.appendChild(subtitle);

        const del = document.createElement('button');
        del.className = 'session-delete';
        del.textContent = '×';
        del.title = '删除会话';
        del.addEventListener('click', (event) => deleteSession(session.id, event));

        item.appendChild(textWrap);
        item.appendChild(del);
        sessionListEl.appendChild(item);
      }
    }

    function renderMessages() {
      messagesEl.innerHTML = '';
      const session = getActiveSession();
      if (!session) {
        chatTitleEl.textContent = '当前会话';
        chatSubtitleEl.textContent = '选择一个模型后开始聊天。';
        endpointHintEl.textContent = '端点将由后端按模型自动选择。';
        messagesEl.appendChild(emptyStateEl);
        return;
      }

      chatTitleEl.textContent = session.title;
      chatSubtitleEl.textContent = `${session.model || '未选择模型'} · ${session.messages.length / 2 > 0 ? '持续对话中' : '空会话'}`;
      endpointHintEl.textContent = '后端会根据 ghc-api 的 supported_endpoints 自动分流。';

      if (!session.messages.length) {
        messagesEl.appendChild(emptyStateEl);
        return;
      }

      for (const message of session.messages) {
        const div = document.createElement('div');
        div.className = `message ${message.role}`;
        div.textContent = message.content;
        messagesEl.appendChild(div);
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setSending(sending) {
      state.sending = sending;
      sendBtnEl.disabled = sending;
      promptEl.disabled = sending;
      modelSelectEl.disabled = sending;
      newChatBtnEl.disabled = sending;
    }

    async function loadConfig() {
      const response = await fetch('/api/config');
      const config = await response.json();
      appNameEl.textContent = config.app_name;
    }

    async function loadModels() {
      const response = await fetch('/api/models');
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.detail || '加载模型失败');
      }

      state.models = payload.data || [];
      modelSelectEl.innerHTML = '';
      if (!state.models.length) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = '没有可用模型';
        modelSelectEl.appendChild(option);
        setModelMeta(null);
        return;
      }

      for (const model of state.models) {
        const option = document.createElement('option');
        option.value = model.id;
        option.textContent = `${model.id}${model.vendor ? ` · ${model.vendor}` : ''}`;
        modelSelectEl.appendChild(option);
      }

      const active = getActiveSession();
      if (active && active.model && state.models.some((item) => item.id === active.model)) {
        modelSelectEl.value = active.model;
      } else {
        modelSelectEl.value = state.models.some((item) => item.id === 'gpt-5.4') ? 'gpt-5.4' : state.models[0].id;
      }
      setModelMeta(selectedModel());
    }

    function updateSessionModel() {
      const session = getActiveSession();
      if (!session) {
        setModelMeta(selectedModel());
        return;
      }
      session.model = modelSelectEl.value;
      session.updatedAt = new Date().toISOString();
      saveSessions();
      renderSessionList();
      renderMessages();
      setModelMeta(selectedModel());
    }

    async function sendMessage() {
      const text = promptEl.value.trim();
      if (!text || state.sending) {
        return;
      }
      if (!modelSelectEl.value) {
        setStatus('请先选择模型');
        return;
      }

      let session = getActiveSession();
      if (!session) {
        session = createSession();
      }
      if (!session.model) {
        session.model = modelSelectEl.value;
      }

      session.messages.push({ role: 'user', content: text });
      if (session.title === '新会话' && session.messages.length === 1) {
        session.title = text.slice(0, 24) || '新会话';
      }
      session.updatedAt = new Date().toISOString();
      saveSessions();
      promptEl.value = '';
      renderSessionList();
      renderMessages();

      setSending(true);
      setStatus('正在请求 ghc-api...');

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: session.model,
            messages: session.messages.filter((item) => item.role === 'user' || item.role === 'assistant'),
          }),
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.detail || '请求失败');
        }

        session.messages.push({ role: 'assistant', content: payload.reply });
        session.updatedAt = new Date().toISOString();
        saveSessions();
        renderMessages();
        setStatus(`已连接 ${payload.model} · ${payload.endpoint}`);
      } catch (error) {
        session.messages.push({ role: 'error', content: `请求失败：${error.message}` });
        session.updatedAt = new Date().toISOString();
        saveSessions();
        renderMessages();
        setStatus('请求失败，请检查 ghc-api 是否可访问');
      } finally {
        setSending(false);
      }
    }

    newChatBtnEl.addEventListener('click', () => {
      createSession();
      syncModelFromSession();
      setStatus('已创建新会话');
    });
    modelSelectEl.addEventListener('change', updateSessionModel);
    sendBtnEl.addEventListener('click', sendMessage);
    promptEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    async function init() {
      loadSessions();
      renderSessionList();
      renderMessages();
      await loadConfig();
      await loadModels();
      if (!state.activeSessionId && state.sessions[0]) {
        state.activeSessionId = state.sessions[0].id;
        saveSessions();
        renderSessionList();
        renderMessages();
      }
      syncModelFromSession();
      setStatus('准备就绪');
    }

    init().catch((error) => {
      setStatus(`初始化失败：${error.message}`);
    });
  </script>
</body>
</html>
