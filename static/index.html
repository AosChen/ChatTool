<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatTool</title>
  <style>
    :root {
      --bg: #efe7da;
      --surface: rgba(255, 251, 245, 0.94);
      --surface-strong: #fffdf8;
      --line: rgba(59, 47, 36, 0.12);
      --text: #2e2a26;
      --muted: #73685c;
      --accent: #0f766e;
      --accent-soft: #d9f4ef;
      --user: #14532d;
      --danger: #b42318;
      --danger-soft: #ffe4e1;
      --shadow: 0 24px 60px rgba(74, 57, 41, 0.14);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100dvh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.8), transparent 30%),
        radial-gradient(circle at bottom right, rgba(15, 118, 110, 0.12), transparent 28%),
        linear-gradient(135deg, #efe7da, #dcc9b0);
      padding: 18px;
      overflow: hidden;
    }

    .hidden { display: none !important; }

    .auth-gate {
      width: min(520px, 100%);
      margin: max(32px, 8vh) auto 0;
      max-height: calc(100dvh - 36px);
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .auth-gate h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .auth-copy,
    .meta,
    .status,
    .session-subtitle {
      color: var(--muted);
      line-height: 1.5;
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--accent);
    }

    .auth-form {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      font-weight: 700;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.94);
      color: var(--text);
      padding: 12px 14px;
    }

    .auth-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 6px;
    }

    .button,
    .new-chat,
    .send,
    .logout {
      border: none;
      border-radius: 16px;
      padding: 12px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .button.primary,
    .new-chat,
    .send {
      background: var(--accent);
      color: white;
    }

    .button.secondary,
    .logout {
      background: rgba(255,255,255,0.78);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .app {
      width: min(1280px, 100%);
      height: calc(100dvh - 36px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 300px 1fr;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 32px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .sidebar {
      background: linear-gradient(180deg, rgba(255,253,248,0.96), rgba(247, 238, 226, 0.92));
      border-right: 1px solid var(--line);
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.7rem;
    }

    .account-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.6);
      border: 1px solid var(--line);
    }

    .account-name {
      font-weight: 700;
    }

    .logout {
      padding: 8px 10px;
    }

    .session-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      min-height: 0;
      padding-right: 4px;
    }

    .tools-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
      padding: 6px 0;
      user-select: none;
    }

    .tools-toggle input {
      width: auto;
      margin: 0;
      cursor: pointer;
    }

    .session-item {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 6px;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.55);
      cursor: pointer;
    }

    .session-item.active {
      background: var(--accent-soft);
      border-color: rgba(15, 118, 110, 0.18);
    }

    .session-title {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-delete {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(180, 35, 24, 0.16);
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      color: #8b5e59;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .session-delete:hover {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: rgba(180, 35, 24, 0.28);
    }

    .session-delete svg {
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    .session-edit {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      color: var(--muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .session-edit:hover {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: rgba(15, 118, 110, 0.28);
    }

    .session-edit svg {
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    .main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      padding: 22px 26px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.45);
    }

    .header h2 {
      margin: 0 0 4px;
      font-size: 1.3rem;
    }

    .messages {
      min-height: 0;
      overflow-y: auto;
      padding: 22px 26px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .empty {
      margin: auto;
      text-align: center;
      color: var(--muted);
      max-width: 460px;
      line-height: 1.6;
    }

    .message {
      max-width: min(78%, 820px);
      border-radius: var(--radius);
      padding: 15px 18px;
      line-height: 1.65;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user);
      color: white;
      border-bottom-right-radius: 8px;
      white-space: pre-wrap;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      border-bottom-left-radius: 8px;
      white-space: normal;
    }

    .message.pending {
      color: var(--muted);
      font-style: italic;
    }

    .message.assistant > :first-child {
      margin-top: 0;
    }

    .message.assistant > :last-child {
      margin-bottom: 0;
    }

    .message.assistant p,
    .message.assistant ul,
    .message.assistant ol,
    .message.assistant pre,
    .message.assistant blockquote,
    .message.assistant h1,
    .message.assistant h2,
    .message.assistant h3,
    .message.assistant h4,
    .message.assistant h5,
    .message.assistant h6 {
      margin: 0 0 0.9em;
    }

    .message.assistant ul,
    .message.assistant ol {
      padding-left: 1.4em;
    }

    .message.assistant li + li {
      margin-top: 0.24em;
    }

    .message.assistant code {
      font-family: Consolas, "SFMono-Regular", Monaco, monospace;
      font-size: 0.94em;
      background: rgba(15, 118, 110, 0.08);
      padding: 0.1em 0.35em;
      border-radius: 6px;
    }

    .message.assistant pre {
      overflow-x: auto;
      background: #1f2430;
      color: #f5f7fb;
      padding: 14px 16px;
      border-radius: 14px;
      line-height: 1.55;
    }

    .message.assistant pre code {
      background: transparent;
      color: inherit;
      padding: 0;
      border-radius: 0;
    }

    .message.assistant blockquote {
      margin-left: 0;
      padding-left: 1em;
      border-left: 3px solid rgba(15, 118, 110, 0.35);
      color: var(--muted);
    }

    .message.assistant a {
      color: var(--accent);
    }

    .message.assistant table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 0.9em;
      display: block;
      overflow-x: auto;
    }

    .message.assistant th,
    .message.assistant td {
      border: 1px solid rgba(59, 47, 36, 0.14);
      padding: 0.55em 0.7em;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    .message.assistant th {
      background: rgba(15, 118, 110, 0.08);
      font-weight: 700;
    }

    .typing-indicator {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .typing-label {
      color: var(--muted);
    }

    .typing-dots {
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(46, 42, 38, 0.35);
      animation: typing-bounce 1s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.3s;
    }

    .composer {
      border-top: 1px solid var(--line);
      padding: 18px 26px 24px;
      background: rgba(255,255,255,0.52);
    }

    .composer-grid {
      display: grid;
      grid-template-columns: 1fr 132px;
      gap: 12px;
      align-items: end;
    }

    #prompt {
      min-height: 74px;
      max-height: 240px;
      resize: vertical;
    }

    .send {
      height: 52px;
    }

    .composer-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .composer-action {
      background: rgba(255,255,255,0.05);
      color: #d6dcff;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .composer-action:hover:not(:disabled) {
      background: rgba(255,255,255,0.1);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal {
      background: #1c1f2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      width: min(560px, 92vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .modal-header h3 {
      margin: 0;
      font-size: 16px;
    }

    .modal-close {
      background: transparent;
      color: #d6dcff;
      border: none;
      font-size: 22px;
      cursor: pointer;
    }

    .modal-body {
      padding: 12px 18px 18px;
      overflow-y: auto;
    }

    .compact-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .compact-item-info {
      flex: 1;
      min-width: 0;
    }

    .compact-item-title {
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .compact-item-meta {
      font-size: 12px;
      color: #8b91a8;
      margin-top: 2px;
    }

    .compact-item-actions {
      display: flex;
      gap: 6px;
    }

    .compact-item-actions button {
      background: rgba(255,255,255,0.05);
      color: #d6dcff;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .compact-item-actions button.danger {
      color: #ff8a8a;
    }

    .send:disabled,
    .new-chat:disabled,
    .logout:disabled,
    .button:disabled,
    input:disabled,
    select:disabled,
    textarea:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    @keyframes typing-bounce {
      0%, 80%, 100% {
        opacity: 0.35;
        transform: translateY(0) scale(1);
      }
      40% {
        opacity: 1;
        transform: translateY(-3px) scale(1.05);
      }
    }

    .menu-toggle,
    .sidebar-close {
      display: none;
    }

    .sidebar-backdrop {
      display: none;
    }

    @media (max-width: 920px) {
      body { padding: 0; }
      .app {
        height: 100dvh;
        border-radius: 0;
        grid-template-columns: 1fr;
        position: relative;
      }
      .auth-gate {
        width: 100%;
        max-height: 100dvh;
        min-height: 100dvh;
        margin: 0;
        border-radius: 0;
      }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 85vw;
        max-width: 340px;
        height: 100dvh;
        z-index: 100;
        border-right: 1px solid var(--line);
        border-bottom: none;
        border-radius: 0;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        box-shadow: none;
      }
      .sidebar.open {
        transform: translateX(0);
        box-shadow: 8px 0 30px rgba(0,0,0,0.15);
      }
      .sidebar-backdrop {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.35);
        z-index: 99;
      }
      .sidebar-backdrop.open {
        display: block;
      }
      .sidebar-close {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255,255,255,0.8);
        cursor: pointer;
        font-size: 1.2rem;
        color: var(--muted);
        padding: 0;
        flex-shrink: 0;
      }
      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .brand p { display: none; }
      .menu-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255,255,255,0.8);
        cursor: pointer;
        font-size: 1.3rem;
        color: var(--text);
        padding: 0;
        flex-shrink: 0;
      }
      .header {
        flex-direction: row;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        background: transparent;
        border-bottom: none;
      }
      .header > div:first-child {
        display: none;
      }
      .header #endpointHint {
        display: none;
      }
      .message {
        max-width: 92%;
      }
      .composer-grid,
      .auth-actions {
        grid-template-columns: 1fr;
      }
      .send {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <section class="auth-gate" id="authGate">
    <h1 id="authAppName">ChatTool</h1>
    <div class="auth-copy">登录后会话保存在服务端。手机和电脑登录同一账号后，会共享同一套聊天记录。</div>
    <div class="auth-form">
      <div class="field">
        <label for="usernameInput">用户名</label>
        <input id="usernameInput" autocomplete="username" placeholder="输入用户名">
      </div>
      <div class="field">
        <label for="passwordInput">密码</label>
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="输入密码">
      </div>
      <div class="auth-actions">
        <button class="button primary" id="loginBtn">登录</button>
        <button class="button secondary" id="registerBtn">注册</button>
      </div>
      <div class="meta" id="authHint">第一次使用可以先注册账号。</div>
      <div class="status" id="authStatus">准备就绪</div>
    </div>
  </section>

  <div class="app hidden" id="chatApp">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h1 id="appName">ChatTool</h1>
        <button class="sidebar-close" id="sidebarCloseBtn" title="关闭">&times;</button>
        <p>直接读取你的 ghc-api 模型列表，自动选择正确端点。聊天记录保存在服务器。</p>
      </div>

      <div class="account-bar">
        <div>
          <div class="meta">当前用户</div>
          <div class="account-name" id="accountName">-</div>
        </div>
        <button class="logout" id="logoutBtn">退出</button>
      </div>

      <button class="new-chat" id="newChatBtn">+ 新建会话</button>

      <div class="field">
        <label for="modelSelect">模型</label>
        <select id="modelSelect">
          <option value="">正在加载模型...</option>
        </select>
      </div>

      <div class="meta" id="modelMeta">尚未加载模型信息</div>

      <label class="tools-toggle">
        <input type="checkbox" id="toolsToggle">
        <span>启用联网/工具（搜索、抓网页等）</span>
      </label>

      <div class="status" id="status">准备就绪</div>

      <div class="session-list" id="sessionList"></div>
    </aside>

    <main class="main">
      <div class="header">
        <button class="menu-toggle" id="menuToggleBtn" title="菜单">&#9776;</button>
        <div>
          <h2 id="chatTitle">当前会话</h2>
          <div class="meta" id="chatSubtitle">先创建会话，然后开始聊天。</div>
        </div>
        <div class="meta" id="endpointHint">端点将由后端按模型自动选择。</div>
      </div>

      <section class="messages" id="messages">
        <div class="empty" id="emptyState">先创建会话，然后发送第一条消息。会话标题会按首条消息自动生成。</div>
      </section>

      <div class="composer">
        <div class="composer-actions">
          <button type="button" class="composer-action" id="compactBtn" title="把当前会话总结并加密保存为一个快照文件">📝 压缩并保存</button>
          <button type="button" class="composer-action" id="loadCompactBtn" title="加载一个已保存的快照到新会话">📂 加载快照</button>
        </div>
        <div class="composer-grid">
          <textarea id="prompt" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
          <button class="send" id="sendBtn">发送</button>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="compactModal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h3>加载快照到新会话</h3>
        <button class="modal-close" id="compactModalCloseBtn" title="关闭">&times;</button>
      </div>
      <div class="modal-body" id="compactList">
        <div class="meta">加载中...</div>
      </div>
    </div>
  </div>

  <script>
    const ACTIVE_KEY = 'chattool_active_session_v2';

    const state = {
      config: null,
      user: null,
      models: [],
      sessions: [],
      messagesBySession: {},
      usageBySession: {},
      loadingMessagesFor: null,
      activeSessionId: localStorage.getItem(ACTIVE_KEY),
      sending: false,
      pendingMessage: null,
      proxyHint: '端点将由后端按模型自动选择。',
    };

    const authGateEl = document.getElementById('authGate');
    const chatAppEl = document.getElementById('chatApp');
    const authAppNameEl = document.getElementById('authAppName');
    const appNameEl = document.getElementById('appName');
    const authHintEl = document.getElementById('authHint');
    const authStatusEl = document.getElementById('authStatus');
    const usernameInputEl = document.getElementById('usernameInput');
    const passwordInputEl = document.getElementById('passwordInput');
    const loginBtnEl = document.getElementById('loginBtn');
    const registerBtnEl = document.getElementById('registerBtn');
    const logoutBtnEl = document.getElementById('logoutBtn');
    const accountNameEl = document.getElementById('accountName');
    const modelSelectEl = document.getElementById('modelSelect');
    const modelMetaEl = document.getElementById('modelMeta');
    const toolsToggleEl = document.getElementById('toolsToggle');
    const statusEl = document.getElementById('status');
    const sessionListEl = document.getElementById('sessionList');
    const chatTitleEl = document.getElementById('chatTitle');
    const chatSubtitleEl = document.getElementById('chatSubtitle');
    const endpointHintEl = document.getElementById('endpointHint');
    const messagesEl = document.getElementById('messages');
    const emptyStateEl = document.getElementById('emptyState');
    const promptEl = document.getElementById('prompt');
    const sendBtnEl = document.getElementById('sendBtn');
    const compactBtnEl = document.getElementById('compactBtn');
    const loadCompactBtnEl = document.getElementById('loadCompactBtn');
    const compactModalEl = document.getElementById('compactModal');
    const compactModalCloseBtnEl = document.getElementById('compactModalCloseBtn');
    const compactListEl = document.getElementById('compactList');
    const newChatBtnEl = document.getElementById('newChatBtn');
    const sidebarEl = document.getElementById('sidebar');
    const sidebarBackdropEl = document.getElementById('sidebarBackdrop');
    const menuToggleBtnEl = document.getElementById('menuToggleBtn');
    const sidebarCloseBtnEl = document.getElementById('sidebarCloseBtn');

    function setStatus(text) {
      statusEl.textContent = text;
      statusEl.className = 'status';
    }

    function setAuthStatus(text, kind = 'neutral') {
      authStatusEl.textContent = text;
      authStatusEl.className = kind === 'error' ? 'status error' : kind === 'success' ? 'status success' : 'status';
    }

    function renderEndpointHint() {
      endpointHintEl.textContent = state.proxyHint;
    }

    function persistActiveSessionId() {
      if (state.activeSessionId) {
        localStorage.setItem(ACTIVE_KEY, state.activeSessionId);
      } else {
        localStorage.removeItem(ACTIVE_KEY);
      }
    }

    function getActiveSession() {
      return state.sessions.find((item) => item.id === state.activeSessionId) || null;
    }

    function selectedModel() {
      return state.models.find((item) => item.id === modelSelectEl.value) || null;
    }

    function setModelMeta(model) {
      if (!model) {
        modelMetaEl.textContent = '尚未加载模型信息';
        return;
      }
      const vendor = model.vendor || 'unknown vendor';
      modelMetaEl.textContent = `${vendor} · 默认端点 ${model.default_endpoint}`;
    }

    function renderAuthState() {
      const loggedIn = Boolean(state.user);
      authGateEl.classList.toggle('hidden', loggedIn);
      chatAppEl.classList.toggle('hidden', !loggedIn);
      accountNameEl.textContent = state.user?.username || '-';
      registerBtnEl.classList.toggle('hidden', !state.config?.enable_registration);
      authHintEl.textContent = state.config?.enable_registration
        ? '第一次使用可以先注册账号。'
        : '当前实例关闭了注册，请使用已有账号登录。';
    }

    function openSidebar() {
      sidebarEl.classList.add('open');
      sidebarBackdropEl.classList.add('open');
    }

    function closeSidebar() {
      sidebarEl.classList.remove('open');
      sidebarBackdropEl.classList.remove('open');
    }

    function setActiveSession(id) {
      state.activeSessionId = id;
      persistActiveSessionId();
      syncModelFromSession();
      renderSessionList();
      renderMessages();
      closeSidebar();
      if (id) {
        ensureMessagesLoaded(id);
      }
    }

    async function ensureMessagesLoaded(sessionId) {
      if (state.messagesBySession[sessionId] !== undefined) return;
      if (state.loadingMessagesFor === sessionId) return;
      state.loadingMessagesFor = sessionId;
      if (state.activeSessionId === sessionId) renderMessages();
      try {
        const payload = await api(`/api/sessions/${sessionId}/messages`);
        state.messagesBySession[sessionId] = payload.data || [];
      } catch (error) {
        if (error.status === 401) {
          handleUnauthorized();
          return;
        }
        if (error.status === 404) {
          state.messagesBySession[sessionId] = [];
        } else {
          setStatus(error.message);
        }
      } finally {
        if (state.loadingMessagesFor === sessionId) {
          state.loadingMessagesFor = null;
        }
        if (state.activeSessionId === sessionId) renderMessages();
      }
    }

    function syncModelFromSession() {
      const session = getActiveSession();
      if (session && session.model && state.models.some((item) => item.id === session.model)) {
        modelSelectEl.value = session.model;
      } else if (state.models.length) {
        modelSelectEl.value = state.models.some((item) => item.id === state.config?.default_model)
          ? state.config.default_model
          : state.models[0].id;
      }
      setModelMeta(selectedModel());
      syncToolsToggleFromSession();
    }

    function syncToolsToggleFromSession() {
      const session = getActiveSession();
      if (session) {
        toolsToggleEl.checked = session.tools_enabled !== false;
        toolsToggleEl.disabled = false;
      } else {
        toolsToggleEl.checked = true;
        toolsToggleEl.disabled = true;
      }
    }

    function upsertSession(session) {
      const { messages, ...meta } = session;
      if (Array.isArray(messages)) {
        state.messagesBySession[meta.id] = messages;
      }
      const index = state.sessions.findIndex((item) => item.id === meta.id);
      if (index >= 0) {
        state.sessions[index] = meta;
      } else {
        state.sessions.unshift(meta);
      }
      state.sessions.sort((left, right) => right.updated_at.localeCompare(left.updated_at));
    }

    function renderedMessages(session) {
      const cached = state.messagesBySession[session.id];
      const messages = cached ? [...cached] : [];
      if (state.pendingMessage && state.pendingMessage.sessionId === session.id) {
        messages.push({ role: 'user', content: state.pendingMessage.userText });
        messages.push({ role: 'assistant', content: '正在思考...', pending: true });
      }
      return messages;
    }

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function safeHref(url) {
      try {
        const parsed = new URL(url, window.location.origin);
        if (['http:', 'https:', 'mailto:'].includes(parsed.protocol)) {
          return parsed.href;
        }
      } catch {
      }
      return '#';
    }

    function renderInlineMarkdown(text) {
      const codeTokens = [];
      let rendered = escapeHtml(text).replace(/`([^`\n]+)`/g, (_, code) => {
        const token = `@@CODE${codeTokens.length}@@`;
        codeTokens.push(`<code>${code}</code>`);
        return token;
      });

      rendered = rendered.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, label, url) => {
        const href = escapeHtml(safeHref(url));
        return `<a href="${href}" target="_blank" rel="noreferrer noopener">${label}</a>`;
      });
      rendered = rendered.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      rendered = rendered.replace(/__([^_]+)__/g, '<strong>$1</strong>');
      rendered = rendered.replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,!?:;]|$)/g, '$1<em>$2</em>');
      rendered = rendered.replace(/(^|[\s(])_([^_\n]+)_(?=[\s).,!?:;]|$)/g, '$1<em>$2</em>');

      for (let i = 0; i < codeTokens.length; i += 1) {
        rendered = rendered.replace(`@@CODE${i}@@`, codeTokens[i]);
      }
      return rendered;
    }

    function splitTableRow(line) {
      let normalized = line.trim();
      if (normalized.startsWith('|')) {
        normalized = normalized.slice(1);
      }
      if (normalized.endsWith('|')) {
        normalized = normalized.slice(0, -1);
      }
      return normalized.split('|').map((cell) => cell.trim());
    }

    function isMarkdownTable(lines, index) {
      if (index + 1 >= lines.length) {
        return false;
      }
      const headerLine = lines[index];
      const separatorLine = lines[index + 1];
      if (!headerLine.includes('|') || !separatorLine.includes('|')) {
        return false;
      }
      const cells = splitTableRow(headerLine);
      if (cells.length < 2) {
        return false;
      }
      return splitTableRow(separatorLine).every((cell) => /^:?-{3,}:?$/.test(cell));
    }

    function renderTable(lines, index) {
      const headers = splitTableRow(lines[index]);
      const rows = [];
      index += 2;

      while (index < lines.length && lines[index].trim() && lines[index].includes('|')) {
        rows.push(splitTableRow(lines[index]));
        index += 1;
      }

      const headerHtml = headers.map((cell) => `<th>${renderInlineMarkdown(cell)}</th>`).join('');
      const bodyHtml = rows
        .map((row) => `<tr>${row.map((cell) => `<td>${renderInlineMarkdown(cell)}</td>`).join('')}</tr>`)
        .join('');

      return {
        html: `<table><thead><tr>${headerHtml}</tr></thead><tbody>${bodyHtml}</tbody></table>`,
        nextIndex: index,
      };
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r\n?/g, '\n').split('\n');
      const blocks = [];
      let index = 0;

      while (index < lines.length) {
        const line = lines[index];
        if (!line.trim()) {
          index += 1;
          continue;
        }

        const fenceMatch = line.match(/^```([\w-]*)\s*$/);
        if (fenceMatch) {
          const codeLines = [];
          index += 1;
          while (index < lines.length && !lines[index].match(/^```/)) {
            codeLines.push(lines[index]);
            index += 1;
          }
          if (index < lines.length) {
            index += 1;
          }
          const language = fenceMatch[1] ? ` class="language-${escapeHtml(fenceMatch[1])}"` : '';
          blocks.push(`<pre><code${language}>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
          continue;
        }

        const headingMatch = line.match(/^(#{1,6})\s+(.+)$/);
        if (headingMatch) {
          const level = headingMatch[1].length;
          blocks.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
          index += 1;
          continue;
        }

        if (isMarkdownTable(lines, index)) {
          const table = renderTable(lines, index);
          blocks.push(table.html);
          index = table.nextIndex;
          continue;
        }

        if (/^>\s?/.test(line)) {
          const quoteLines = [];
          while (index < lines.length && /^>\s?/.test(lines[index])) {
            quoteLines.push(lines[index].replace(/^>\s?/, ''));
            index += 1;
          }
          blocks.push(`<blockquote>${quoteLines.map(renderInlineMarkdown).join('<br>')}</blockquote>`);
          continue;
        }

        if (/^[-*+]\s+/.test(line)) {
          const items = [];
          while (index < lines.length && /^[-*+]\s+/.test(lines[index])) {
            items.push(`<li>${renderInlineMarkdown(lines[index].replace(/^[-*+]\s+/, ''))}</li>`);
            index += 1;
          }
          blocks.push(`<ul>${items.join('')}</ul>`);
          continue;
        }

        if (/^\d+\.\s+/.test(line)) {
          const items = [];
          while (index < lines.length && /^\d+\.\s+/.test(lines[index])) {
            items.push(`<li>${renderInlineMarkdown(lines[index].replace(/^\d+\.\s+/, ''))}</li>`);
            index += 1;
          }
          blocks.push(`<ol>${items.join('')}</ol>`);
          continue;
        }

        const paragraphLines = [];
        while (index < lines.length && lines[index].trim()) {
          if (
            paragraphLines.length > 0 && (
              lines[index].match(/^```/) ||
              lines[index].match(/^(#{1,6})\s+/) ||
              lines[index].match(/^>\s?/) ||
              lines[index].match(/^[-*+]\s+/) ||
              lines[index].match(/^\d+\.\s+/)
            )
          ) {
            break;
          }
          paragraphLines.push(lines[index]);
          index += 1;
        }
        if (paragraphLines.length) {
          blocks.push(`<p>${paragraphLines.map(renderInlineMarkdown).join('<br>')}</p>`);
        } else {
          index += 1;
        }
      }

      return blocks.join('');
    }

    function renderSessionList() {
      sessionListEl.innerHTML = '';
      if (!state.sessions.length) {
        const div = document.createElement('div');
        div.className = 'session-subtitle';
        div.textContent = '还没有会话。点击“新建会话”开始。';
        sessionListEl.appendChild(div);
        return;
      }

      for (const session of state.sessions) {
        const item = document.createElement('div');
        item.className = 'session-item' + (session.id === state.activeSessionId ? ' active' : '');
        item.addEventListener('click', () => setActiveSession(session.id));

        const textWrap = document.createElement('div');
        const title = document.createElement('div');
        title.className = 'session-title';
        title.textContent = session.title;
        const subtitle = document.createElement('div');
        subtitle.className = 'session-subtitle';
        subtitle.textContent = session.model || '未选择模型';
        textWrap.appendChild(title);
        textWrap.appendChild(subtitle);

        const edit = document.createElement('button');
        edit.className = 'session-edit';
        edit.innerHTML = `
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
          </svg>
        `;
        edit.title = '重命名会话';
        edit.addEventListener('click', (event) => {
          event.stopPropagation();
          renameSession(session);
        });

        const del = document.createElement('button');
        del.className = 'session-delete';
        del.innerHTML = `
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18"></path>
            <path d="M8 6V4.8C8 3.81 8.81 3 9.8 3h4.4C15.19 3 16 3.81 16 4.8V6"></path>
            <path d="M18 6v12.2c0 .99-.81 1.8-1.8 1.8H7.8C6.81 20 6 19.19 6 18.2V6"></path>
            <path d="M10 10v6"></path>
            <path d="M14 10v6"></path>
          </svg>
        `;
        del.title = '删除会话';
        del.addEventListener('click', (event) => {
          event.stopPropagation();
          deleteSession(session.id);
        });

        item.appendChild(textWrap);
        item.appendChild(edit);
        item.appendChild(del);
        sessionListEl.appendChild(item);
      }
    }

    function renderMessages() {
      messagesEl.innerHTML = '';
      const session = getActiveSession();
      if (!session) {
        chatTitleEl.textContent = '当前会话';
        chatSubtitleEl.textContent = '先创建会话，然后开始聊天。';
        renderEndpointHint();
        messagesEl.appendChild(emptyStateEl);
        return;
      }

      chatTitleEl.textContent = session.title;
      const cacheLoaded = state.messagesBySession[session.id] !== undefined;
      const messages = renderedMessages(session);
      if (!cacheLoaded && !state.pendingMessage) {
        chatSubtitleEl.textContent = `${session.model || '未选择模型'} · 加载中...`;
        renderEndpointHint();
        const loading = document.createElement('div');
        loading.className = 'empty';
        loading.textContent = '正在加载消息...';
        messagesEl.appendChild(loading);
        return;
      }
      const usage = state.usageBySession[session.id];
      const usageHint = usage
        ? ` · 上下文 ${usage.input_tokens.toLocaleString()} tok · 上次回复 ${usage.output_tokens.toLocaleString()} tok` +
          (usage.cache_read_input_tokens
            ? ` · 缓存命中 ${usage.cache_read_input_tokens.toLocaleString()}`
            : '') +
          (usage.cache_creation_input_tokens
            ? ` · 缓存写入 ${usage.cache_creation_input_tokens.toLocaleString()}`
            : '')
        : '';
      chatSubtitleEl.textContent = `${session.model || '未选择模型'} · ${messages.length ? '持续对话中' : '空会话'}${usageHint}`;
      renderEndpointHint();

      if (!messages.length) {
        messagesEl.appendChild(emptyStateEl);
        return;
      }

      for (const message of messages) {
        const div = document.createElement('div');
        div.className = `message ${message.role}${message.pending ? ' pending' : ''}`;
        if (message.pending) {
          div.innerHTML = `
            <span class="typing-indicator">
              <span class="typing-label">正在思考</span>
              <span class="typing-dots" aria-hidden="true">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
              </span>
            </span>
          `;
        } else if (message.role === 'assistant') {
          div.innerHTML = renderMarkdown(message.content);
        } else {
          div.textContent = message.content;
        }
        messagesEl.appendChild(div);
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setSending(sending) {
      state.sending = sending;
      sendBtnEl.disabled = sending;
      promptEl.disabled = sending;
      modelSelectEl.disabled = sending;
      toolsToggleEl.disabled = sending || !getActiveSession();
      newChatBtnEl.disabled = sending;
      logoutBtnEl.disabled = sending;
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        credentials: 'same-origin',
        ...options,
      });
      const isJson = response.headers.get('content-type')?.includes('application/json');
      const payload = isJson ? await response.json() : null;

      if (!response.ok) {
        const error = new Error(formatErrorDetail(payload?.detail, response.status));
        error.status = response.status;
        throw error;
      }

      return payload;
    }

    function formatErrorDetail(detail, status) {
      if (typeof detail === 'string' && detail.trim()) {
        return detail;
      }
      if (Array.isArray(detail)) {
        const parts = detail
          .map((item) => {
            if (typeof item === 'string') {
              return item;
            }
            if (item && typeof item === 'object') {
              const path = Array.isArray(item.loc) ? item.loc.join('.') : '';
              const message = typeof item.msg === 'string' ? item.msg : JSON.stringify(item);
              return path ? `${path}: ${message}` : message;
            }
            return String(item);
          })
          .filter(Boolean);
        if (parts.length) {
          return parts.join('; ');
        }
      }
      if (detail && typeof detail === 'object') {
        if (typeof detail.message === 'string' && detail.message.trim()) {
          return detail.message;
        }
        try {
          return JSON.stringify(detail);
        } catch {
          return `请求失败 (${status})`;
        }
      }
      return `请求失败 (${status})`;
    }

    function handleUnauthorized() {
      state.user = null;
      state.sessions = [];
      state.messagesBySession = {};
      state.usageBySession = {};
      state.activeSessionId = null;
      persistActiveSessionId();
      renderAuthState();
      renderSessionList();
      renderMessages();
      setStatus('请先登录');
      setAuthStatus('登录状态已失效，请重新登录', 'error');
    }

    async function loadConfig() {
      const config = await api('/api/config');
      state.config = config;
      appNameEl.textContent = config.app_name;
      authAppNameEl.textContent = config.app_name;
      const candidates = Array.isArray(config.proxy_base_url_candidates) ? config.proxy_base_url_candidates : [];
      if (candidates.length) {
        state.proxyHint = `上游模式 ${config.proxy_target} · ${candidates.join(' -> ')}`;
      }
      renderEndpointHint();
      renderAuthState();
    }

    async function loadCurrentUser() {
      try {
        const payload = await api('/api/auth/me');
        state.user = payload.user;
      } catch (error) {
        if (error.status === 401) {
          state.user = null;
          return;
        }
        throw error;
      }
    }

    async function loadModels() {
      const payload = await api('/api/models');
      state.models = payload.data || [];
      modelSelectEl.innerHTML = '';
      if (!state.models.length) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = '没有可用模型';
        modelSelectEl.appendChild(option);
        setModelMeta(null);
        return;
      }

      for (const model of state.models) {
        const option = document.createElement('option');
        option.value = model.id;
        option.textContent = `${model.id}${model.vendor ? ` · ${model.vendor}` : ''}`;
        modelSelectEl.appendChild(option);
      }

      syncModelFromSession();
    }

    async function refreshSessions() {
      const payload = await api('/api/sessions');
      state.sessions = payload.data || [];
      const validIds = new Set(state.sessions.map((item) => item.id));
      for (const id of Object.keys(state.messagesBySession)) {
        if (!validIds.has(id)) delete state.messagesBySession[id];
      }
      if (state.activeSessionId && !validIds.has(state.activeSessionId)) {
        state.activeSessionId = null;
      }
      if (!state.activeSessionId && state.sessions.length) {
        state.activeSessionId = state.sessions[0].id;
      }
      persistActiveSessionId();
      renderSessionList();
      syncModelFromSession();
      renderMessages();
      if (state.activeSessionId) {
        ensureMessagesLoaded(state.activeSessionId);
      }
    }

    async function bootstrapChat() {
      await loadModels();
      await refreshSessions();
      setStatus('准备就绪');
    }

    async function submitAuth(mode) {
      const username = usernameInputEl.value.trim();
      const password = passwordInputEl.value;
      if (!username || !password) {
        setAuthStatus('请输入用户名和密码', 'error');
        return;
      }

      loginBtnEl.disabled = true;
      registerBtnEl.disabled = true;
      setAuthStatus(mode === 'login' ? '正在登录...' : '正在注册...');

      try {
        const payload = await api(
          mode === 'login' ? '/api/auth/login' : '/api/auth/register',
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          }
        );
        state.user = payload.user;
        usernameInputEl.value = '';
        passwordInputEl.value = '';
        renderAuthState();
        await bootstrapChat();
        setAuthStatus(mode === 'login' ? '登录成功' : '注册并登录成功', 'success');
      } catch (error) {
        setAuthStatus(error.message, 'error');
      } finally {
        loginBtnEl.disabled = false;
        registerBtnEl.disabled = false;
      }
    }

    async function createSession() {
      const payload = await api('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: modelSelectEl.value || state.config.default_model,
        }),
      });
      upsertSession(payload);
      setActiveSession(payload.id);
      renderSessionList();
      renderMessages();
      return payload;
    }

    async function renameSession(session) {
      const next = window.prompt('重命名会话', session.title || '');
      if (next === null) return;
      const title = next.trim();
      if (!title || title === session.title) return;
      try {
        const payload = await api(`/api/sessions/${session.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title }),
        });
        upsertSession(payload);
        renderSessionList();
        renderMessages();
        setStatus('会话已重命名');
      } catch (error) {
        if (error.status === 401) {
          handleUnauthorized();
          return;
        }
        setStatus(error.message);
      }
    }

    async function deleteSession(id) {
      try {
        await api(`/api/sessions/${id}`, { method: 'DELETE' });
        state.sessions = state.sessions.filter((item) => item.id !== id);
        delete state.messagesBySession[id];
        delete state.usageBySession[id];
        if (state.activeSessionId === id) {
          state.activeSessionId = state.sessions[0]?.id || null;
        }
        persistActiveSessionId();
        renderSessionList();
        syncModelFromSession();
        renderMessages();
        setStatus('会话已删除');
      } catch (error) {
        if (error.status === 401) {
          handleUnauthorized();
          return;
        }
        setStatus(error.message);
      }
    }

    async function updateSessionModel() {
      const session = getActiveSession();
      if (!session) {
        setModelMeta(selectedModel());
        return;
      }
      try {
        const payload = await api(`/api/sessions/${session.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: modelSelectEl.value }),
        });
        upsertSession(payload);
        setModelMeta(selectedModel());
        renderSessionList();
        renderMessages();
      } catch (error) {
        if (error.status === 401) {
          handleUnauthorized();
          return;
        }
        setStatus(error.message);
      }
    }

    async function updateSessionToolsEnabled() {
      const session = getActiveSession();
      if (!session) {
        syncToolsToggleFromSession();
        return;
      }
      const next = toolsToggleEl.checked;
      try {
        const payload = await api(`/api/sessions/${session.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tools_enabled: next }),
        });
        upsertSession(payload);
        setStatus(next ? '已启用工具' : '已切换为纯聊天模式');
      } catch (error) {
        if (error.status === 401) {
          handleUnauthorized();
          return;
        }
        setStatus(error.message);
        toolsToggleEl.checked = !next;
      }
    }

    async function sendMessage() {
      const text = promptEl.value.trim();
      if (!text || state.sending) {
        return;
      }
      if (!modelSelectEl.value) {
        setStatus('请先选择模型');
        return;
      }

      setSending(true);
      setStatus('正在请求 ghc-api...');

      try {
        let session = getActiveSession();
        if (!session) {
          session = await createSession();
        }

        promptEl.value = '';
        state.pendingMessage = {
          sessionId: session.id,
          userText: text,
        };
        renderMessages();

        const payload = await api('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            session_id: session.id,
            content: text,
          }),
        });

        state.pendingMessage = null;
        upsertSession(payload.session);
        if (payload.usage) {
          state.usageBySession[payload.session.id] = payload.usage;
        }
        setActiveSession(payload.session.id);
        const usageMsg = payload.usage
          ? ` · 输入 ${payload.usage.input_tokens.toLocaleString()} tok · 输出 ${payload.usage.output_tokens.toLocaleString()} tok`
          : '';
        setStatus(`已连接 ${payload.model} · ${payload.endpoint} · ${payload.upstream}${usageMsg}`);
      } catch (error) {
        state.pendingMessage = null;
        if (error.status === 401) {
          handleUnauthorized();
          return;
        }
        renderMessages();
        setStatus(error.message);
      } finally {
        setSending(false);
      }
    }

    async function logout() {
      logoutBtnEl.disabled = true;
      try {
        await api('/api/auth/logout', { method: 'POST' });
      } catch (error) {
        if (error.status !== 401) {
          setStatus(error.message);
        }
      } finally {
        state.user = null;
        state.sessions = [];
        state.messagesBySession = {};
        state.usageBySession = {};
        state.activeSessionId = null;
        persistActiveSessionId();
        renderAuthState();
        renderSessionList();
        renderMessages();
        setAuthStatus('已退出', 'success');
        logoutBtnEl.disabled = false;
      }
    }

    async function compactCurrentSession() {
      if (!state.activeSessionId) {
        setStatus('请先选择一个会话');
        return;
      }
      if (state.sending) {
        setStatus('正在发送中，请稍候');
        return;
      }
      const confirmed = window.confirm('将当前会话总结并加密保存为一个快照？\n\n这会发起一次模型调用，原会话不会被改动。');
      if (!confirmed) return;
      compactBtnEl.disabled = true;
      setStatus('正在压缩当前会话...');
      try {
        const payload = await api(`/api/sessions/${state.activeSessionId}/compact`, {
          method: 'POST',
        });
        setStatus(`已保存快照：${payload.compact.title}`);
      } catch (error) {
        if (error.status === 401) { handleUnauthorized(); return; }
        setStatus('压缩失败：' + error.message);
      } finally {
        compactBtnEl.disabled = false;
      }
    }

    function formatBytes(n) {
      if (n < 1024) return `${n} B`;
      if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
      return `${(n / 1024 / 1024).toFixed(2)} MB`;
    }

    function formatCreatedAt(iso) {
      try { return new Date(iso).toLocaleString(); } catch { return iso; }
    }

    function renderCompactList(items) {
      if (!items.length) {
        compactListEl.innerHTML = '<div class="meta">还没有任何快照。先在某个会话里点「压缩并保存」。</div>';
        return;
      }
      compactListEl.innerHTML = '';
      for (const item of items) {
        const row = document.createElement('div');
        row.className = 'compact-item';
        const info = document.createElement('div');
        info.className = 'compact-item-info';
        const title = document.createElement('div');
        title.className = 'compact-item-title';
        title.textContent = item.title;
        const meta = document.createElement('div');
        meta.className = 'compact-item-meta';
        meta.textContent = `${formatCreatedAt(item.created_at)} · ${formatBytes(item.byte_size)}`;
        info.appendChild(title);
        info.appendChild(meta);

        const actions = document.createElement('div');
        actions.className = 'compact-item-actions';
        const loadBtn = document.createElement('button');
        loadBtn.textContent = '加载到新会话';
        loadBtn.addEventListener('click', () => loadCompactToNewSession(item.id));
        const delBtn = document.createElement('button');
        delBtn.className = 'danger';
        delBtn.textContent = '删除';
        delBtn.addEventListener('click', () => deleteCompact(item.id));
        actions.appendChild(loadBtn);
        actions.appendChild(delBtn);

        row.appendChild(info);
        row.appendChild(actions);
        compactListEl.appendChild(row);
      }
    }

    async function openCompactModal() {
      compactModalEl.hidden = false;
      compactListEl.innerHTML = '<div class="meta">加载中...</div>';
      try {
        const payload = await api('/api/compacts');
        renderCompactList(payload.data || []);
      } catch (error) {
        if (error.status === 401) { handleUnauthorized(); return; }
        compactListEl.innerHTML = `<div class="meta">加载失败：${error.message}</div>`;
      }
    }

    function closeCompactModal() {
      compactModalEl.hidden = true;
    }

    async function loadCompactToNewSession(compactId) {
      setStatus('正在加载快照并创建新会话...');
      try {
        const payload = await api(`/api/compacts/${compactId}/load`, { method: 'POST' });
        const session = payload.session;
        upsertSession(session);
        state.messagesBySession[session.id] = session.messages || [];
        setActiveSession(session.id);
        renderSessionList();
        renderMessages();
        closeCompactModal();
        setStatus('已加载快照，可以继续对话');
      } catch (error) {
        if (error.status === 401) { handleUnauthorized(); return; }
        setStatus('加载失败：' + error.message);
      }
    }

    async function deleteCompact(compactId) {
      if (!window.confirm('确定删除这个快照？删除后无法恢复。')) return;
      try {
        await api(`/api/compacts/${compactId}`, { method: 'DELETE' });
        await openCompactModal();
      } catch (error) {
        if (error.status === 401) { handleUnauthorized(); return; }
        setStatus('删除失败：' + error.message);
      }
    }

    menuToggleBtnEl.addEventListener('click', openSidebar);
    sidebarCloseBtnEl.addEventListener('click', closeSidebar);
    sidebarBackdropEl.addEventListener('click', closeSidebar);
    loginBtnEl.addEventListener('click', () => submitAuth('login'));
    registerBtnEl.addEventListener('click', () => submitAuth('register'));
    logoutBtnEl.addEventListener('click', logout);
    compactBtnEl.addEventListener('click', compactCurrentSession);
    loadCompactBtnEl.addEventListener('click', openCompactModal);
    compactModalCloseBtnEl.addEventListener('click', closeCompactModal);
    compactModalEl.addEventListener('click', (event) => {
      if (event.target === compactModalEl) closeCompactModal();
    });
    newChatBtnEl.addEventListener('click', async () => {
      try {
        await createSession();
        setStatus('已创建新会话');
      } catch (error) {
        if (error.status === 401) {
          handleUnauthorized();
          return;
        }
        setStatus(error.message);
      }
    });
    modelSelectEl.addEventListener('change', updateSessionModel);
    toolsToggleEl.addEventListener('change', updateSessionToolsEnabled);
    sendBtnEl.addEventListener('click', sendMessage);
    promptEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey && !event.isComposing && event.keyCode !== 229) {
        event.preventDefault();
        sendMessage();
      }
    });
    passwordInputEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        submitAuth('login');
      }
    });

    async function init() {
      await loadConfig();
      await loadCurrentUser();
      renderAuthState();

      if (!state.user) {
        setStatus('请先登录');
        return;
      }

      await bootstrapChat();
    }

    init().catch((error) => {
      setAuthStatus(`初始化失败：${error.message}`, 'error');
      setStatus(`初始化失败：${error.message}`);
    });
  </script>
</body>
</html>
